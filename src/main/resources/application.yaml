spring:
  application:
    name: hospital-management-api

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  cache:
    type: simple

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL_USERNAME}
    password: ${EMAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  task:
    execution:
      pool:
        core-size: 4

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  otp:
    expiry-minutes: 10

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 900000
  refresh-token-expiration: 604800000

server:
  port: ${PORT:8080}

management:
  endpoint:
    health:
      enabled: true
      show-details: always
      probes:
        enabled: true

  endpoints:
    web:
      base-path: /actuator
      exposure:
        include:
          - health
          - info

  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true